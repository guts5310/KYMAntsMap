<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1e293b">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('NatureLog PWA 가동 성공!', reg))
          .catch(err => console.log('PWA 등록 실패', err));
      });
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>NatureLog Pro</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.js"></script>
  <style>
    :root{
      --bg:#141814;--surface:#1e241e;--surface2:#252c25;--border:#2e382e;
      --accent:#7ec87e;--accent2:#4a9e4a;--text:#e8ede8;--text2:#8fa88f;
      --danger:#e07070;--radius:10px;--font:'SF Pro Text',-apple-system,'Segoe UI',sans-serif;--tr:.18s ease;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text)}
    #app{display:flex;flex-direction:column;height:100vh}

    /* HEADER (Safe Area Top) */
    #header{
      display:flex;align-items:center;justify-content:space-between;
      padding: 10px 14px; padding-top: calc(10px + env(safe-area-inset-top));
      background:var(--surface);border-bottom:1px solid var(--border);z-index:100;flex-shrink:0
    }
    #header h1{font-size:16px;font-weight:600;color:var(--accent)}
    #header-actions{display:flex;gap:6px}
    .icon-btn{width:34px;height:34px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
    .icon-btn:hover,.icon-btn.active{background:var(--border);color:var(--accent)}

    /* NAV (Safe Area Bottom) */
    #nav{
      display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;order:10;
      padding-bottom: calc(6px + env(safe-area-inset-bottom));
    }
    .nav-tab{flex:1;padding:8px 4px 6px;text-align:center;cursor:pointer;color:var(--text2);font-size:10px;border:none;background:none;transition:color var(--tr);display:flex;flex-direction:column;align-items:center;gap:2px}
    .nav-tab .ni{font-size:19px}
    .nav-tab.active{color:var(--accent)}

    /* VIEWS */
    #views{flex:1;overflow:hidden;position:relative}
    .view{position:absolute;inset:0;overflow:hidden;display:none}
    .view.active{display:flex;flex-direction:column}

    /* MAP CONTROLS */
    #map{flex:1}
    #map-controls{position:absolute;top:calc(8px + env(safe-area-inset-top));left:8px;right:56px;z-index:500;display:flex;gap:6px}
    #search-bar{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
    #filter-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text2);cursor:pointer;font-size:14px}
    #filter-drawer{position:absolute;top:calc(52px + env(safe-area-inset-top));left:8px;right:8px;z-index:600;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:none;flex-direction:column;gap:10px}
    #filter-drawer.open{display:flex}
    .filter-chip{padding:5px 12px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer}
    .filter-chip.active{background:var(--accent2);border-color:var(--accent);color:var(--text)}
    .filter-cats{display:flex;flex-wrap:wrap;gap:6px}

    /* MAP BUTTONS */
    #locate-btn{position:absolute;bottom:24px;right:8px;z-index:500;width:40px;height:40px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text2)}
    #layer-toggle-btn{position:absolute;bottom:24px;left:8px;z-index:500;width:40px;height:40px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center}
    #layer-panel{position:absolute;bottom:72px;left:8px;z-index:500;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;min-width:160px;display:none}
    #layer-panel.open{display:block}
    #layer-panel h4{font-size:11px;color:var(--text2);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
    .layer-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
    #map-pick-banner{display:none;position:absolute;top:calc(52px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:600;background:var(--accent2);color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 2px 12px rgba(0,0,0,.4)}
    #view-mode-btn{position:absolute;top:calc(8px + env(safe-area-inset-top));right:8px;z-index:500;width:40px;height:40px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--text2)}

    /* LIST SORT & CONTENT */
    #obs-overlay{position:absolute;inset:0;z-index:400;display:none;flex-direction:column;background:var(--bg)}
    #obs-overlay.active{display:flex}
    #obs-overlay-header{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface)}
    #obs-container{flex:1;overflow-y:auto;padding:10px}
    .sort-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:12px;outline:none}

    /* LIST/THUMB ITEMS */
    .obs-list-item{display:flex;gap:10px;padding:10px;margin-bottom:7px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer}
    .obs-thumb{width:56px;height:56px;border-radius:8px;object-fit:cover;background:var(--surface2)}
    .obs-thumb-placeholder{width:56px;height:56px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px}
    .obs-info{flex:1;min-width:0}
    .obs-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .obs-meta{font-size:11px;color:var(--text2)}
    .obs-cat{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;margin-top:3px;background:var(--surface2);border:1px solid var(--border)}

    #obs-container.thumb-mode{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:8px}
    .obs-thumb-card{border-radius:8px;overflow:hidden;cursor:pointer;background:var(--surface);border:1px solid var(--border);position:relative}
    .obs-thumb-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
    .obs-thumb-card .thumb-no-img{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--surface2)}
    .obs-thumb-card .thumb-label{padding:5px 6px}
    .obs-thumb-card .thumb-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .obs-thumb-card .thumb-date{font-size:9px;color:var(--text2)}
    .obs-thumb-card .thumb-count{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px}
    .obs-thumb-card .cat-dot-abs{position:absolute;top:4px;left:4px;width:8px;height:8px;border-radius:50%;border:1px solid rgba(255,255,255,.5)}
    .year-sep{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;padding:6px 0 3px;grid-column:1/-1}

    /* MODALS & BOTTOM SHEET (Safe Area Bottom) */
    #modal-overlay, .panel-overlay, #detail-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center}
    #modal-overlay.open, .panel-overlay.open, #detail-overlay.open{display:flex}
    #modal, .panel-sheet, #detail-modal{width:100%;max-width:520px;max-height:90vh;background:var(--surface);border-radius:18px 18px 0 0;overflow-y:auto;padding:18px 18px calc(24px + env(safe-area-inset-bottom))}
    .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
    .modal-title{font-size:15px;font-weight:600;margin-bottom:14px}
    .form-group{margin-bottom:12px}
    .form-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block}
    .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;outline:none}
    .form-input:focus{border-color:var(--accent2)}

    /* PHOTO PREVIEWS */
    #photo-previews{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .preview-img-wrap{position:relative}
    .preview-img{width:66px;height:66px;object-fit:cover;border-radius:8px;cursor:pointer}
    .preview-remove{position:absolute;top:-4px;right:-4px;width:18px;height:18px;background:var(--danger);border-radius:50%;border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center}

    /* CHIPS & PRESETS */
    .cat-chips, .preset-chips{display:flex;flex-wrap:wrap;gap:6px}
    .cat-chip, .preset-chip{padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:4px}
    .cat-chip.selected{border-color:var(--accent);color:var(--text)}
    .preset-chip{border-color:var(--border);background:var(--bg);color:var(--accent)}

    .btn-primary{width:100%;padding:11px;border-radius:10px;border:none;background:var(--accent2);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
    .btn-secondary{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer;text-align:center}
    .btn-danger{border-color:var(--danger)!important;color:var(--danger)!important}

    /* DETAIL UI */
    #detail-photos{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px}
    #detail-photos img{height:190px;border-radius:10px;object-fit:cover;cursor:pointer;max-width:90%}
    .detail-name{font-size:19px;font-weight:700;margin-bottom:3px}
    .detail-meta{font-size:12px;color:var(--text2);margin-bottom:8px}
    .detail-actions{display:flex;gap:8px;margin-top:14px}

    /* LIGHTBOX (IMAGE FULLSCREEN VIEW) */
    #lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:3000;display:none;align-items:center;justify-content:center}
    #lightbox img{max-width:100%;max-height:100%;object-fit:contain}
    #lightbox-close{position:absolute;top:calc(16px + env(safe-area-inset-top));right:16px;color:#fff;font-size:28px;cursor:pointer;background:rgba(0,0,0,0.5);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}

    /* SETTINGS EXTRA */
    .setting-section{margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:14px}
    .map-style-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .map-style-btn{padding:10px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;text-align:center}
    .map-style-btn.active{border-color:var(--accent);color:var(--accent);background:var(--surface)}

    /* TOAST */
    #toast{position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:20px;font-size:13px;z-index:2500;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* Cluster Custom Customizing */
    .marker-cluster-small{background-color:rgba(126,200,126,0.6)!important}
    .marker-cluster-small div{background-color:rgba(74,158,74,0.8)!important;color:#fff!important}
    .marker-cluster-medium{background-color:rgba(224,112,112,0.6)!important}
    .marker-cluster-medium div{background-color:rgba(224,112,112,0.8)!important;color:#fff!important}

    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  </style>
</head>
<body>
<div id="app">

  <div id="header">
    <h1>🌿 NatureLog Pro</h1>
    <div id="header-actions">
      <button class="icon-btn" onclick="openGpxPanel()" title="GPX">〰️</button>
      <button class="icon-btn" onclick="openSettings()" title="설정">⚙️</button>
      <button class="icon-btn" onclick="openAddModal()" title="추가">＋</button>
    </div>
  </div>

  <div id="views">
    <div class="view active" id="view-map">
      <div id="map-controls">
        <input id="search-bar" type="text" placeholder="이름 또는 카테고리 검색…" oninput="onSearchInput()">
        <button id="filter-btn" onclick="toggleFilter()">필터</button>
      </div>
      <div id="filter-drawer">
        <div>
          <div class="form-label">카테고리</div>
          <div class="filter-cats" id="filter-cat-chips"></div>
        </div>
        <div>
          <div class="form-label">이름 검색</div>
          <input id="filter-name-input" type="text" placeholder="이름 입력…" oninput="applyFilters()" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;outline:none">
        </div>
        <button class="btn-primary" style="margin-top:0" onclick="applyFilters();toggleFilter()">적용</button>
      </div>
      <div id="map"></div>
      <div id="map-pick-banner">📍 위치를 탭하여 선택 &nbsp;<span onclick="cancelMapPick()" style="cursor:pointer;opacity:.8;">✕ 취소</span></div>
      <div id="layer-panel">
        <h4>연도 레이어</h4>
        <div id="year-layers"></div>
      </div>
      <button id="layer-toggle-btn" onclick="toggleLayerPanel()">🗂️</button>
      <button id="locate-btn" onclick="locateMe()">📍</button>
      <button id="view-mode-btn" onclick="cycleViewMode()" title="보기 전환">🗺️</button>

      <div id="obs-overlay">
        <div id="obs-overlay-header">
          <h2 id="obs-count">0개 관찰</h2>
          <div style="display:flex;gap:8px;align-items:center">
            <select id="obs-sort" class="sort-select" onchange="changeSort()">
              <option value="latest">최신순</option>
              <option value="oldest">과거순</option>
              <option value="name">이름순</option>
            </select>
            <button onclick="setObsMode('list')" id="obs-list-btn" style="width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--accent2);color:#fff;cursor:pointer;">☰</button>
            <button onclick="setObsMode('thumb')" id="obs-thumb-btn" style="width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;">⊞</button>
          </div>
        </div>
        <div id="obs-container"></div>
      </div>
    </div>
  </div>

  <nav id="nav">
    <button class="nav-tab active" onclick="showMapView()"><span class="ni">🗺️</span>지도</button>
    <button class="nav-tab" onclick="showObsList()"><span class="ni">📋</span>목록</button>
    <button class="nav-tab" onclick="showObsThumb()"><span class="ni">⊞</span>썸네일</button>
  </nav>

</div>

<div id="modal-overlay" onclick="closeAddModal(event)">
  <div id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">새 관찰 기록</div>
    <div class="form-group">
      <label class="form-label">사진 (GPS 위치정보 자동분석)</label>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <button onclick="document.getElementById('photo-input-gallery').click()" style="flex:1;padding:11px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px">📷 카메라 / 갤러리</button>

        <button onclick="document.getElementById('photo-input-cloud').click()" style="flex:1;padding:11px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px">🖼️ 구글드라이브 / 포토</button>
      </div>

      <input type="file" id="photo-input-gallery" accept="image/*, .heic, .heif" multiple style="display:none" onchange="handlePhotoUpload(event)">
      <input type="file" id="photo-input-cloud" accept="application/octet-stream, application/x-binary, *.*" multiple style="display:none" onchange="handlePhotoUpload(event)">

      <div id="photo-previews"></div>
    </div>
    <div class="form-group">
      <label class="form-label">이름</label>
      <input class="form-input" id="obs-name" type="text" placeholder="예: 참나리, 박새…">
    </div>
    <div class="form-group">
      <label class="form-label">카테고리</label>
      <div class="cat-chips" id="cat-chips-form"></div>
    </div>
    <div class="form-group">
      <label class="form-label">날짜</label>
      <input class="form-input" id="obs-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">위치</label>
      <div style="display:flex;gap:8px">
        <input class="form-input" id="obs-lat" type="number" placeholder="위도" step="0.000001" style="flex:1">
        <input class="form-input" id="obs-lng" type="number" placeholder="경도" step="0.000001" style="flex:1">
      </div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button onclick="useCurrentLocation()" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px">📍 현재 위치</button>
        <button onclick="startMapPick()" style="flex:1;padding:8px;border-radius:8px;border:1px solid var(--accent2);background:var(--surface2);color:var(--accent);cursor:pointer;font-size:12px">🗺️ 지도에서 선택</button>
      </div>
      <div id="picked-location" style="display:none;margin-top:5px;font-size:11px;color:var(--accent);text-align:center"></div>
    </div>
    <div class="form-group">
      <label class="form-label">메모 프리셋</label>
      <div class="preset-chips" id="form-presets" style="margin-bottom:6px"></div>
      <label class="form-label">메모 입력</label>
      <textarea class="form-input" id="obs-note" rows="3" placeholder="자유롭게 기록…" style="resize:none"></textarea>
    </div>
    <button class="btn-primary" id="save-btn" onclick="saveObservation()">저장</button>
  </div>
</div>

<div id="detail-overlay" onclick="closeDetailModal(event)">
  <div id="detail-modal">
    <div class="modal-handle"></div>
    <div id="detail-photos"></div>
    <div class="detail-name" id="detail-name"></div>
    <div class="detail-meta" id="detail-meta"></div>
    <div id="detail-note" style="font-size:13px;color:var(--text2);margin-top:6px;white-space:pre-wrap"></div>
    <div class="detail-actions">
      <button class="btn-secondary" onclick="goToOnMap()">🗺️ 지도</button>
      <button class="btn-secondary" onclick="editObservation()">✏️ 수정</button>
      <button class="btn-secondary btn-danger" onclick="deleteObservation()">🗑️ 삭제</button>
    </div>
  </div>
</div>

<div id="gpx-overlay" class="panel-overlay" onclick="closePanelOverlay('gpx-overlay',event)">
  <div class="panel-sheet">
    <div class="modal-handle"></div>
    <div class="panel-title">〰️ GPX 동선 관리</div>
    <div id="gpx-list"></div>
    <button class="btn-primary" style="margin-top:12px" onclick="document.getElementById('gpx-input').click()">GPX 파일 업로드</button>
    <input type="file" id="gpx-input" accept=".gpx" style="display:none" onchange="handleGpxUpload(event)">
  </div>
</div>

<div id="settings-overlay" class="panel-overlay" onclick="closePanelOverlay('settings-overlay',event)">
  <div class="panel-sheet">
    <div class="modal-handle"></div>
    <div class="panel-title">⚙️ 설정 및 백업</div>

    <div class="setting-section">
      <div class="form-label">지도 스타일</div>
      <div class="map-style-grid" id="map-style-grid"></div>
    </div>

    <div class="setting-section">

        <button class="btn-secondary" onclick="document.getElementById('import-input').click()">📥 백업 복원 (JSON 불러오기)</button>

    </div>

    <div class="setting-section">
      <div class="form-label">메모 해시태그 프리셋 관리</div>
      <div id="settings-preset-list" class="preset-chips" style="margin-bottom:8px"></div>
      <div style="display:flex;gap:8px">
        <input id="new-preset-text" class="form-input" type="text" placeholder="예: #개화 #희귀종" style="flex:1">
        <button onclick="addNewPreset()" style="padding:0 14px;border-radius:8px;border:1px solid var(--accent2);background:var(--surface2);color:var(--accent);cursor:pointer">추가</button>
      </div>

    <div class="setting-section" style="border:none;margin:0;padding:0">
      <div class="form-label">카테고리 관리</div>
      <div id="cat-setting-list"></div>

      <div class="form-label" style="margin-top:10px; font-size:10px; color:var(--text2);">카테고리 색상 선택</div>
      <div id="palette-container" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px;"></div>

      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="new-cat-name" class="form-input" type="text" placeholder="새 카테고리 이름">
        <button onclick="addNewCategory()" style="padding:0 20px;border-radius:8px;border:1px solid var(--accent2);background:var(--surface2);color:var(--accent);font-weight:600;cursor:pointer">＋ 추가</button>

<div id="lightbox" onclick="closeLightbox()">
  <div id="lightbox-close">✕</div>
  <img id="lightbox-img" src="" alt="">
</div>

<div id="toast"></div>

<script>
  // ── STATE ──
  let selectedPaletteColor = '#7ec87e'; // 기본 선택 색상
  const PRESET_PALETTE = [
    '#7ec87e', '#4a9e4a', '#64b5f6', '#2196f3', '#e07070',
    '#f44336', '#ffb74d', '#ff9800', '#ba68c8', '#9c27b0',
    '#a1887f', '#4db6ac', '#e91e63', '#90a4ae', '#ffffff'
  ]; // ◀ 이 괄호와 세미콜론 복원 완료!

  let observations = JSON.parse(localStorage.getItem('nl_obs') || '[]');
  let gpxTracks    = JSON.parse(localStorage.getItem('nl_gpx') || '[]');
  let presets      = JSON.parse(localStorage.getItem('nl_presets') || '["#개화", "#군락지", "#희귀종", "#채집", "#탐사"]');
  let currentSort  = 'latest';

  let defaultCats  = [{name:'식물',color:'#7ec87e'},{name:'조류',color:'#64b5f6'},{name:'곤충',color:'#e07070'}];
  let categories   = JSON.parse(localStorage.getItem('nl_cats2') || '[]');
  if(!categories.length) { categories = defaultCats; localStorage.setItem('nl_cats2', JSON.stringify(categories)); }

  let filters      = { name:'', cats:[], years:{} };
  let obsMode      = 'list';
  let viewMode     = 'map';
  let currentObs   = null;
  let editingId    = null;
  let pendingPhotos = [];
  let existingPhotos = [];
  let selectedCat  = null;
  let map, clusterGroup, gpxLayers={}, currentTileLayer=null;
  let userMarker=null, mapPickMode=false, mapPickMarker=null;
  let savedStyle = localStorage.getItem('nl_mapstyle');
  let currentMapStyle = (savedStyle && !isNaN(savedStyle)) ? parseInt(savedStyle) : 0;

  const MAP_STYLES = [
    {name:'기본 지도', url:'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', attr:'© OSM', gpxColor:'#ff5722'},
    {name:'위성 지도', url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', attr:'© Esri', gpxColor:'#ffffff'},
    {name:'지형 지도', url:'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', attr:'© OpenTopoMap', gpxColor:'#ffeb3b'},
    {name:'다크 심플', url:'https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png', attr:'© Stadia', gpxColor:'#7ec87e'},
  ];
  const VIEW_ICONS = {map:'🗺️', list:'☰', thumb:'⊞'};

  // ── INIT ──
  document.addEventListener('DOMContentLoaded', ()=>{
    initMap();
    renderCatChips();
    renderFilterCatChips();
    renderPresets();
    document.getElementById('obs-date').value = new Date().toISOString().slice(0,10);
    renderMarkers();
    renderObs();
    renderYearLayers();
    gpxTracks.forEach(t=>{ if(t.visible) drawGpxTrack(t); });
  });

  // ── MAP & CLUSTER ──
  function initMap(){
    map = L.map('map',{zoomControl:false}).setView([36.5,127.8],7);
    L.control.zoom({position:'bottomright'}).addTo(map);
    clusterGroup = L.markerClusterGroup({ maxClusterRadius: 40, showCoverageOnHover: false }).addTo(map);
    if (currentMapStyle === null || currentMapStyle === undefined || isNaN(currentMapStyle)) {
      currentMapStyle = 0;
    }
    applyMapStyle(currentMapStyle, false);
    map.on('click', e=>{ if(mapPickMode) applyMapPick(e.latlng.lat, e.latlng.lng); });
  }

  function applyMapStyle(idx, save=true){
    if(currentTileLayer) currentTileLayer.remove();
    currentTileLayer = L.tileLayer(MAP_STYLES[idx].url,{attribution:MAP_STYLES[idx].attr,maxZoom:19}).addTo(map);
    currentMapStyle = idx;
    if(save) localStorage.setItem('nl_mapstyle',idx);
    document.querySelectorAll('.map-style-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
    gpxTracks.forEach(t=>{ if(t.visible) drawGpxTrack(t); });
  }

  function getCatColor(n){ return categories.find(c=>c.name===n)?.color || '#7ec87e'; }

  function renderMarkers(focusFiltered=false){
    clusterGroup.clearLayers();
    const filtered = getFiltered();
    const bounds = [];

    filtered.forEach(obs=>{
      if(!obs.lat||!obs.lng) return;
      const yr = obs.date?obs.date.slice(0,4):'unknown';
      if(filters.years[yr]===false) return;
      const color = getCatColor(obs.cat);

      const icon = L.divIcon({
        className:'',
        html:`<div style="width:26px;height:26px;border-radius:50% 50% 50% 0;background:${color};border:2px solid #fff;transform:rotate(-45deg);box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>`,
        iconSize:[26,26],iconAnchor:[13,26]
      });
      const marker = L.marker([obs.lat,obs.lng],{icon});
      marker.on('click', (e)=>{
        L.DomEvent.stopPropagation(e);
        openDetail(obs.id);
      });
      clusterGroup.addLayer(marker);
      bounds.push([obs.lat,obs.lng]);
    });

    if(focusFiltered && bounds.length){
      if(bounds.length===1) map.setView(bounds[0],15);
      else map.fitBounds(bounds,{padding:[40,40]});
    }
  }

  function locateMe(){
    navigator.geolocation.getCurrentPosition(pos=>{
      const {latitude:lat,longitude:lng}=pos.coords;
      map.setView([lat,lng],15);
      if(userMarker) userMarker.remove();
      userMarker=L.circleMarker([lat,lng],{radius:7,fillColor:'#7ec87e',color:'#fff',weight:2,fillOpacity:1}).addTo(map);
      showToast('현재 위치로 이동했습니다');
    },()=>showToast('GPS 위치를 가져올 수 없습니다'));
  }

  // ── SORT & LIST MODES ──
  function cycleViewMode(){
    if(viewMode==='map') setViewMode('list');
    else if(viewMode==='list') setViewMode('thumb');
    else setViewMode('map');
  }
  function setViewMode(mode){
    viewMode = mode;
    document.getElementById('view-mode-btn').textContent = VIEW_ICONS[mode];
    const overlay = document.getElementById('obs-overlay');
    if(mode==='map'){ overlay.classList.remove('active'); setTimeout(()=>map.invalidateSize(),100); }
    else { obsMode = mode; overlay.classList.add('active'); renderObs(); }
    document.querySelectorAll('.nav-tab').forEach((t,i)=>{
      t.classList.toggle('active', (mode==='map'&&i===0)||(mode==='list'&&i===1)||(mode==='thumb'&&i===2));
    });
  }
  function showMapView(){ setViewMode('map'); }
  function showObsList(){ setViewMode('list'); }
  function showObsThumb(){ setViewMode('thumb'); }
  function setObsMode(m){ obsMode=m; renderObs(); }
  function changeSort(){ currentSort = document.getElementById('obs-sort').value; renderObs(); }

  function getFiltered(){
    let items = observations.filter(o=>{
      const nm=!filters.name||(o.name||'').toLowerCase().includes(filters.name.toLowerCase())||(o.cat||'').toLowerCase().includes(filters.name.toLowerCase());
      const cm=filters.cats.length===0||filters.cats.includes(o.cat);
      return nm&&cm;
    });
    if(currentSort==='latest') items.sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
    else if(currentSort==='oldest') items.sort((a,b)=>new Date(a.date||0)-new Date(b.date||0));
    else if(currentSort==='name') items.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    return items;
  }

  function renderObs(){
    const c = document.getElementById('obs-container');
    const filtered = getFiltered();
    document.getElementById('obs-count').textContent = `${filtered.length}개 관찰`;

    document.getElementById('obs-list-btn').style.background = obsMode==='list'?'var(--accent2)':'var(--surface2)';
    document.getElementById('obs-thumb-btn').style.background = obsMode==='thumb'?'var(--accent2)':'var(--surface2)';

    if(obsMode==='thumb'){
      c.className='thumb-mode'; c.innerHTML='';
      filtered.forEach(obs=>{
        const fp=obs.photos?.[0];
        const card=document.createElement('div'); card.className='obs-thumb-card';
        card.innerHTML=`${fp?`<img src="${fp}">`:`<div class="thumb-no-img">🌿</div>`}
          <div class="cat-dot-abs" style="background:${getCatColor(obs.cat)}"></div>
          ${obs.photos?.length>1?`<div class="thumb-count">+${obs.photos.length}</div>`:''}
          <div class="thumb-label"><div class="thumb-name">${obs.name||'이름 없음'}</div><div class="thumb-date">${obs.date||''}</div></div>`;
        card.onclick=()=>openDetail(obs.id); c.appendChild(card);
      });
    } else {
      c.className=''; c.innerHTML='';
      filtered.forEach(obs=>{
        const fp=obs.photos?.[0];
        const item=document.createElement('div'); item.className='obs-list-item';
        item.innerHTML=`${fp?`<img class="obs-thumb" src="${fp}">`:`<div class="obs-thumb-placeholder">🌿</div>`}
          <div class="obs-info">
            <div class="obs-name">${obs.name||'이름 없음'}</div>
            <div class="obs-meta">${obs.date||''} · ${obs.photos?.length||0}장</div>
            ${obs.cat?`<span class="obs-cat"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${getCatColor(obs.cat)};margin-right:4px"></span>${obs.cat}</span>`:''}
          </div>`;
        item.onclick=()=>openDetail(obs.id); c.appendChild(item);
      });
    }
  }

// ── LAYER & FILTER DRAWER ──
  function renderYearLayers(){
    const years=[...new Set(observations.map(o=>o.date?o.date.slice(0,4):'unknown'))].sort().reverse();
    const c=document.getElementById('year-layers'); c.innerHTML='';
    years.forEach(yr=>{
      if(filters.years[yr]===undefined) filters.years[yr]=true;
      const d=document.createElement('div'); d.className='layer-item';
      d.innerHTML=`<input type="checkbox" id="yr-${yr}" ${filters.years[yr]?'checked':''} style="accent-color:var(--accent)"><label for="yr-${yr}" style="margin-left:6px;font-size:13px">${yr}년</label>`;
      d.querySelector('input').onchange=e=>{ filters.years[yr]=e.target.checked; renderMarkers(); renderObs(); };
      c.appendChild(d);
    });
  }
  function toggleLayerPanel(){ document.getElementById('layer-panel').classList.toggle('open'); }
  function toggleFilter(){ document.getElementById('filter-drawer').classList.toggle('open'); }
  function renderFilterCatChips(){
    const c=document.getElementById('filter-cat-chips'); c.innerHTML='';
    categories.forEach(cat=>{
      const ch=document.createElement('div'); ch.className='filter-chip'+(filters.cats.includes(cat.name)?' active':'');
      ch.innerHTML=`${cat.name}`;
      ch.onclick=()=>{
        if(filters.cats.includes(cat.name)) filters.cats=filters.cats.filter(c=>c!==cat.name);
        else filters.cats.push(cat.name);
        ch.classList.toggle('active'); applyFilters();
      };
      c.appendChild(ch);
    });
  }
  function onSearchInput(){ filters.name=document.getElementById('search-bar').value; applyFilters(); }
  function applyFilters(){
    filters.name=document.getElementById('filter-name-input').value||document.getElementById('search-bar').value;
    renderMarkers(true); renderObs();
  }

  // ── MAP PICK LOCATION ──
  function startMapPick(){
    document.getElementById('modal-overlay').classList.remove('open');
    setViewMode('map');
    setTimeout(()=>{ mapPickMode=true; document.getElementById('map-pick-banner').style.display='block'; },200);
  }
  function cancelMapPick(){ mapPickMode=false; document.getElementById('map-pick-banner').style.display='none'; }
  function applyMapPick(lat,lng){
    cancelMapPick();
    document.getElementById('modal-overlay').classList.add('open');
    document.getElementById('obs-lat').value=lat.toFixed(6);
    document.getElementById('obs-lng').value=lng.toFixed(6);
    document.getElementById('picked-location').style.display='block';
    document.getElementById('picked-location').textContent=`📍 선택 좌표: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  }
  function useCurrentLocation(){
    navigator.geolocation.getCurrentPosition(pos=>{
      document.getElementById('obs-lat').value=pos.coords.latitude.toFixed(6);
      document.getElementById('obs-lng').value=pos.coords.longitude.toFixed(6);
      document.getElementById('picked-location').style.display='block';
      document.getElementById('picked-location').textContent=`📍 실시간 GPS 위치 자동 입력됨`;
    });
  }

  // ── PRESETS & TAGS ──
  function renderPresets(){
    const fContainer = document.getElementById('form-presets'); fContainer.innerHTML='';
    const sContainer = document.getElementById('settings-preset-list'); sContainer.innerHTML='';

    presets.forEach((p, idx)=>{
      // 글쓰기 폼 전용 칩
      const chip = document.createElement('div'); chip.className='preset-chip'; chip.textContent=p;
      chip.onclick=()=>{
        const ta = document.getElementById('obs-note');
        ta.value = (ta.value.trim() + ' ' + p).trim() + ' ';
      };
      fContainer.appendChild(chip);

      // 설정창 관리용 칩
      const sChip = document.createElement('div'); sChip.className='preset-chip';
      sChip.innerHTML=`${p} <span style="color:var(--danger);margin-left:4px">✕</span>`;
      sChip.onclick=()=>{ presets.splice(idx,1); localStorage.setItem('nl_presets',JSON.stringify(presets)); renderPresets(); };
      sContainer.appendChild(sChip);
    });
  }
  function addNewPreset(){
    const txt = document.getElementById('new-preset-text').value.trim();
    if(!txt) return;
    if(!presets.includes(txt)) presets.push(txt);
    localStorage.setItem('nl_presets',JSON.stringify(presets));
    renderPresets();
    document.getElementById('new-preset-text').value='';
  }
  // ── HIGH-RESOLUTION REWRITTEN PHOTO UPLOAD ──
  // ── 1. [여기에 붙여넣기] 스크립트 최상단이나 적당한 빈 공간에 스프레드시트 링크 선언
let cloudLocationDB = {};

// ⚠️ 구글 시트에서 [파일] ➔ [공유] ➔ [웹에 게시] ➔ 링크 형태를 [쉼표로 구분된 값(.csv)]으로 선택 후 발급받은 URL을 여기에 넣으세요!
const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTOdXejzvdTQS9G16XlJoAZ1sRETM-VdXFRIz3Ucpr2-kiwrP2b_FiqyizEJ4dkYL-Tqi0tqpk6zsz9/pub?output=csv";

// 앱이 켜질 때 자동으로 구글 시트 데이터를 0.1초 만에 로드하는 함수
function syncCloudLocationDB() {
  if (!GOOGLE_SHEET_CSV_URL || GOOGLE_SHEET_CSV_URL.includes("XXXXXX")) return;
  fetch(GOOGLE_SHEET_CSV_URL)
    .then(res => res.text())
    .then(csvText => {
      const lines = csvText.split('\n');
      cloudLocationDB = {};
      lines.forEach((line, index) => {
        if (index === 0 || !line.trim()) return;
        const cols = line.split(',');
        if (cols.length >= 3) {
          const fileName = cols[0].replace(/"/g, '').trim(); // A열: 파일명
          const lat = parseFloat(cols[1]);                 // B열: 위도
          const lng = parseFloat(cols[2]);                 // C열: 경도
          const date = cols[3] ? cols[3].replace(/"/g, '').trim() : ''; // D열: 날짜
          if (!isNaN(lat) && !isNaN(lng)) {
            cloudLocationDB[fileName] = { lat, lng, date };
          }
        }
      });
      console.log("🚀 구글 시트 실시간 GPS 데이터 동기화 완료!");
    })
    .catch(err => console.error("구글 시트 연동 실패:", err));
}

// 웹페이지가 로드되면 즉시 구글 시트 동기화 실행
window.addEventListener('DOMContentLoaded', syncCloudLocationDB);


// ── 📸 용량 체크 브레이크를 원천 삭제한 사진 업로드 프로세서 ──
function handlePhotoUpload(ev) {
  const files = Array.from(ev.target.files);
  if (!files.length) return;

  files.forEach(file => {
    const fileName = file.name; // 파일명 추출

    // ⚠️ [중요] 기존에 들어있던 file.size 체크나 경고창(alert) 팝업 로직이 있다면
    // 여기 영역에서 완전히 지워버려야 경고창이 안 뜹니다!

    // 구글 스프레드시트 매칭 진행
    if (cloudLocationDB[fileName]) {
      const meta = cloudLocationDB[fileName];

      document.getElementById('obs-lat').value = meta.lat.toFixed(6);
      document.getElementById('obs-lng').value = meta.lng.toFixed(6);
      if (meta.date) document.getElementById('obs-date').value = meta.date;

      const pl = document.getElementById('picked-location');
      if (pl) {
        pl.style.display = 'block';
        pl.textContent = `☁️ 구글 시트 GPS 매칭 성공 (${meta.lat.toFixed(4)}, ${meta.lng.toFixed(4)})`;
      }
      if (typeof showToast === 'function') showToast('🚀 구글 시트 GPS 동기화 완료!');

      // 용량 경고고 뭐고 다 무시하고 곧바로 초강력 압축 엔진으로 패스!
      finalizePureImageProcessing(file);
    } else {
      if (typeof showToast === 'function') showToast('📷 시트에 없는 사진입니다. 수동 입력을 권장합니다.');
      finalizePureImageProcessing(file);
    }
  });
  ev.target.value = '';
}

// ── 📸 [최종판] 초강력 용량 다이어트 및 파일 블롭(Blob) 압축 프로세서 ──
function finalizePureImageProcessing(file) {
  const imgReader = new FileReader();
  imgReader.onload = function(evt) {
    const img = new Image();
    img.onload = function() {
      // 1. 최대 해상도를 800픽셀로 대폭 제한 (모바일 화면에서는 충분히 선명함)
      const max_size = 800;
      let width = img.width;
      let height = img.height;

      if (width > height) {
        if (width > max_size) { height *= max_size / width; width = max_size; }
      } else {
        if (height > max_size) { width *= max_size / height; height = max_size; }
      }

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);

      // 2. 압축률을 0.5(50%)로 과감하게 낮추고 Canvas 가상 파일화(toBlob) 처리
      // 이 방식으로 변환해야 브라우저 메모리 폭발을 원천 차단할 수 있습니다.
      canvas.toBlob(function(blob) {
        if (!blob) return;

        // 웹뷰 내부 저장 공간에 부담이 없도록 초경량화된 DataURL을 새로 생성
        const blobReader = new FileReader();
        blobReader.onloadend = function() {
          const compressedDataUrl = blobReader.result;

          // 내 프로젝트의 사진 저장 배열(pendingPhotos)에 안전하게 매핑
          if (typeof pendingPhotos !== 'undefined') {
            const idx = pendingPhotos.length;
            pendingPhotos.push({ dataUrl: compressedDataUrl });

            const pw = document.getElementById('photo-previews');
            if (pw) {
              const w = document.createElement('div');
              w.className = 'preview-img-wrap';
              w.dataset.idx = idx;
              w.innerHTML = `<img class="preview-img" src="${compressedDataUrl}"><button class="preview-remove" onclick="removePhoto(${idx})">✕</button>`;
              pw.appendChild(w);
            }
          }
        };
        blobReader.readAsDataURL(blob);
      }, 'image/jpeg', 0.5); // JPEG 포맷 50% 압축률 타겟팅
    };
    img.src = evt.target.result;
  };
  imgReader.readAsDataURL(file);
}

  // ── IMAGE RESIZE & WEBPAGE CONTAINER COMPRESS ──
  function finalizeImageProcessing(file, finalLat, finalLng, formattedDate) {
    const imgReader = new FileReader();
    imgReader.onload = function(evt) {
      const img = new Image();
      img.onload = function() {
        const max_size = 1280;
        let width = img.width, height = img.height;
        if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
        else { if (height > max_size) { width *= max_size / height; height = max_size; } }

        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.85);
        const idx = pendingPhotos.length;
        pendingPhotos.push({ dataUrl: compressedDataUrl });

        if(formattedDate) document.getElementById('obs-date').value = formattedDate;

        if(finalLat && finalLng) {
          document.getElementById('obs-lat').value = finalLat.toFixed(6);
          document.getElementById('obs-lng').value = finalLng.toFixed(6);
          const pl = document.getElementById('picked-location');
          pl.style.display = 'block';
          pl.textContent = `📸 고화질 메타데이터 GPS 분석 완료 (${finalLat.toFixed(4)}, ${finalLng.toFixed(4)})`;
          showToast('📸 메타데이터 수집 매칭 성공!');
        } else {
          showToast('📷 사진 분석 완료 (GPS 없음: 실시간 위치 또는 수동 입력 권장)');
        }

        const pw = document.getElementById('photo-previews');
        const w = document.createElement('div'); w.className = 'preview-img-wrap'; w.dataset.idx = idx;
        w.innerHTML = `<img class="preview-img" src="${compressedDataUrl}" onclick="openLightbox('${compressedDataUrl}')"><button class="preview-remove" onclick="removePhoto(${idx})">✕</button>`;
        pw.appendChild(w);
      };
      img.src = evt.target.result;
    };
    imgReader.readAsDataURL(file);
  }

  function removePhoto(i){ pendingPhotos[i]=null; document.querySelector(`.preview-img-wrap[data-idx="${i}"]`)?.remove(); }

  // ── ADD & SAVE ──
  function openAddModal(){
    editingId=null; pendingPhotos=[]; existingPhotos=[];
    document.getElementById('photo-previews').innerHTML='';
    document.getElementById('obs-name').value=''; document.getElementById('obs-note').value='';
    document.getElementById('obs-lat').value=''; document.getElementById('obs-lng').value='';
    document.getElementById('picked-location').style.display='none';
    selectedCat=null; document.getElementById('obs-date').value=new Date().toISOString().slice(0,10);
    document.getElementById('modal-title').textContent='새 관찰 기록';
    document.getElementById('save-btn').textContent='저장';
    renderCatChips(); document.getElementById('modal-overlay').classList.add('open');
  }
  function closeAddModal(e){ if(e?e.target===document.getElementById('modal-overlay'):true) document.getElementById('modal-overlay').classList.remove('open'); }

  function saveObservation(){
    const nameInput = document.getElementById('obs-name').value.trim();
    const photos = [...existingPhotos.filter(Boolean), ...pendingPhotos.filter(Boolean).map(p=>p.dataUrl)];

    const obs = {
      id: editingId || Date.now().toString(),
      name: nameInput || '이름 없음',
      date: document.getElementById('obs-date').value,
      lat: parseFloat(document.getElementById('obs-lat').value) || null,
      lng: parseFloat(document.getElementById('obs-lng').value) || null,
      note: document.getElementById('obs-note').value,
      cat: selectedCat, photos,
      createdAt: editingId ? (observations.find(o=>o.id===editingId)?.createdAt || new Date().toISOString()) : new Date().toISOString()
    };

    if(editingId){
      const idx=observations.findIndex(o=>o.id===editingId);
      if(idx!==-1) observations[idx]=obs;
    } else { observations.unshift(obs); }

    try {
      localStorage.setItem('nl_obs', JSON.stringify(observations));
      renderMarkers(); renderObs(); renderYearLayers();
      closeAddModal();
      showToast('💾 관찰 데이터가 완벽히 저장되었습니다.');
      if(obs.lat) { setViewMode('map'); setTimeout(()=>map.flyTo([obs.lat,obs.lng],15),300); }
    } catch(e) { showToast('⚠️ 사진 용량이 너무 큽니다. 사진 장수를 줄여주세요.'); }
  }

  // ── DETAIL SHEET & LIGHTBOX ──
  function openDetail(id){
    currentObs=observations.find(o=>o.id===id); if(!currentObs) return;
    const color=getCatColor(currentObs.cat);
    document.getElementById('detail-photos').innerHTML=currentObs.photos?.length
      ? currentObs.photos.map(p=>`<img src="${p}" onclick="openLightbox('${p}')">`).join('')
      : `<div style="font-size:36px;padding:10px">🌿</div>`;
    document.getElementById('detail-name').textContent=currentObs.name;
    document.getElementById('detail-meta').innerHTML=[
      currentObs.cat?`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:4px"></span>${currentObs.cat}`:null,
      currentObs.date, currentObs.lat?`${currentObs.lat.toFixed(4)}, ${currentObs.lng.toFixed(4)}`:null
    ].filter(Boolean).join(' · ');
    document.getElementById('detail-note').textContent=currentObs.note || '메모가 작성되지 않았습니다.';
    document.getElementById('detail-overlay').classList.add('open');
  }
  function closeDetailModal(e){ if(e?e.target===document.getElementById('detail-overlay'):true) document.getElementById('detail-overlay').classList.remove('open'); }

  function openLightbox(url){
    document.getElementById('lightbox-img').src = url;
    document.getElementById('lightbox').style.display = 'flex';
  }
  function closeLightbox(){ document.getElementById('lightbox').style.display = 'none'; }

  function editObservation(){
    if(!currentObs) return; closeDetailModal();
    editingId=currentObs.id; pendingPhotos=[]; existingPhotos=[...(currentObs.photos||[])];
    const prev=document.getElementById('photo-previews'); prev.innerHTML='';
    existingPhotos.forEach((url,i)=>{
      const w=document.createElement('div'); w.className='preview-img-wrap'; w.dataset.eidx=i;
      w.innerHTML=`<img class="preview-img" src="${url}" onclick="openLightbox('${url}')"><button class="preview-remove" onclick="removeExistingPhoto(${i})">✕</button>`;
      prev.appendChild(w);
    });
    document.getElementById('obs-name').value=currentObs.name;
    document.getElementById('obs-note').value=currentObs.note||'';
    document.getElementById('obs-date').value=currentObs.date||'';
    document.getElementById('obs-lat').value=currentObs.lat||'';
    document.getElementById('obs-lng').value=currentObs.lng||'';
    selectedCat=currentObs.cat; renderCatChips();
    document.getElementById('modal-title').textContent='관찰 정보 수정';
    document.getElementById('modal-overlay').classList.add('open');
  }
  function removeExistingPhoto(i){ existingPhotos[i]=null; document.querySelector(`.preview-img-wrap[data-eidx="${i}"]`)?.remove(); }
  function deleteObservation(){
    if(!confirm(`"${currentObs.name}" 기록을 삭제하시겠습니까?`)) return;
    observations=observations.filter(o=>o.id!==currentObs.id);
    localStorage.setItem('nl_obs',JSON.stringify(observations));
    renderMarkers(); renderObs(); renderYearLayers(); closeDetailModal(); showToast('🗑️ 삭제 완료');
  }
  function goToOnMap(){
    if(!currentObs?.lat){ showToast('위치 정보가 없는 게시물입니다'); return; }
    closeDetailModal(); setViewMode('map');
    setTimeout(()=>map.flyTo([currentObs.lat,currentObs.lng],16),300);
  }

  // ── GPX DYNAMIC LINES ──
  function openGpxPanel(){ renderGpxList(); document.getElementById('gpx-overlay').classList.add('open'); }
  function closePanelOverlay(id,e){ if(e?e.target===document.getElementById(id):true) document.getElementById(id).classList.remove('open'); }
  function handleGpxUpload(ev){
    const file=ev.target.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=e=>{
      const xml=new DOMParser().parseFromString(e.target.result,'text/xml');
      const pts=xml.querySelectorAll('trkpt');
      const coords=[]; pts.forEach(p=>coords.push([parseFloat(p.getAttribute('lat')),parseFloat(p.getAttribute('lon'))]));
      const track={id:Date.now().toString(),name:file.name.replace('.gpx',''),coords,visible:true};
      gpxTracks.push(track); localStorage.setItem('nl_gpx',JSON.stringify(gpxTracks));
      drawGpxTrack(track); renderGpxList(); showToast('〰️ GPX 트랙 동선 반영 완료');
    };
    r.readAsText(file); ev.target.value='';
  }
  function drawGpxTrack(t){
    if(gpxLayers[t.id]) gpxLayers[t.id].remove();
    if(!t.visible||!t.coords.length) return;
    gpxLayers[t.id]=L.polyline(t.coords,{color:MAP_STYLES[currentMapStyle].gpxColor,weight:3,opacity:.85,dashArray:'6,6'}).addTo(map);
  }
  function renderGpxList(){
    const list=document.getElementById('gpx-list'); list.innerHTML='';
    if(!gpxTracks.length){ list.innerHTML='<div style="color:var(--text2);font-size:12px;text-align:center;padding:12px 0">동선 파일이 없습니다.</div>'; return; }
    gpxTracks.forEach(t=>{
      const item=document.createElement('div'); item.className='gpx-item';
      item.innerHTML=`<span class="gpx-name">${t.name}</span>
        <span style="cursor:pointer;font-size:16px;margin-right:8px" onclick="toggleGpx('${t.id}')">${t.visible?'👁️ 보기중':'🙈 숨김'}</span>
        <span style="cursor:pointer;font-size:14px;color:var(--danger)" onclick="deleteGpx('${t.id}')">삭제</span>`;
      list.appendChild(item);
    });
  }
  function toggleGpx(id){
    const t=gpxTracks.find(t=>t.id===id); if(!t) return; t.visible=!t.visible;
    localStorage.setItem('nl_gpx',JSON.stringify(gpxTracks));
    if(t.visible) drawGpxTrack(t); else if(gpxLayers[id]) { gpxLayers[id].remove(); delete gpxLayers[id]; }
    renderGpxList();
  }
  function deleteGpx(id){
    gpxTracks=gpxTracks.filter(t=>t.id!==id); localStorage.setItem('nl_gpx',JSON.stringify(gpxTracks));
    if(gpxLayers[id]) { gpxLayers[id].remove(); delete gpxLayers[id]; }
    renderGpxList();
  }

  // ── SETTINGS & 📂 BACKUP/RESTORE ──
  function openSettings(){ renderMapStyleGrid(); renderCatSettings(); renderPresets(); renderPalette(); document.getElementById('settings-overlay').classList.add('open'); }
  function renderMapStyleGrid(){
    const g=document.getElementById('map-style-grid'); g.innerHTML='';
    MAP_STYLES.forEach((s,i)=>{
      const b=document.createElement('button'); b.className='map-style-btn'+(i===currentMapStyle?' active':'');
      b.textContent=s.name; b.onclick=()=>applyMapStyle(i); g.appendChild(b);
    });
  }
  function exportData(){
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({obs:observations, gpx:gpxTracks, cats:categories, presets:presets}));
    const dlAnchor = document.createElement('a'); dlAnchor.setAttribute("href", dataStr);
    dlAnchor.setAttribute("download", `naturelog_backup_${new Date().toISOString().slice(0,10)}.json`);
    document.body.appendChild(dlAnchor); dlAnchor.click(); dlAnchor.remove();
    showToast('📂 백업 파일이 생성되어 다운로드되었습니다.');
  }
  function importData(ev){
    const file = ev.target.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = e => {
      try {
        const parsed = JSON.parse(e.target.result);
        if(parsed.obs) observations = parsed.obs;
        if(parsed.gpx) gpxTracks = parsed.gpx;
        if(parsed.cats) categories = parsed.cats;
        if(parsed.presets) presets = parsed.presets;

        localStorage.setItem('nl_obs', JSON.stringify(observations));
        localStorage.setItem('nl_gpx', JSON.stringify(gpxTracks));
        localStorage.setItem('nl_cats2', JSON.stringify(categories));
        localStorage.setItem('nl_presets', JSON.stringify(presets));

        renderMarkers(); renderObs(); renderYearLayers(); renderPresets(); renderCatChips(); renderFilterCatChips();
        showToast('📥 모든 데이터 복원이 성공적으로 완료되었습니다.');
        closePanelOverlay('settings-overlay');
      } catch(err) { showToast('⚠️ 유효하지 않은 백업 파일양식입니다.'); }
    };
    r.readAsText(file); ev.target.value='';
  }

  // ── PALETTE RENDERING ──
  function renderPalette(){
    const container = document.getElementById('palette-container');
    container.innerHTML = '';

    PRESET_PALETTE.forEach(color => {
      const isSelected = selectedPaletteColor === color;
      const item = document.createElement('div');
      item.style.width = '28px';
      item.style.height = '28px';
      item.style.borderRadius = '50%';
      item.style.backgroundColor = color;
      item.style.cursor = 'pointer';
      item.style.boxSizing = 'border-box';
      item.style.transition = 'transform 0.15s';

      if(isSelected) {
        item.style.border = '3px solid var(--text)';
        item.style.transform = 'scale(1.15)';
      } else {
        item.style.border = '1px solid var(--border)';
      }

      item.onclick = () => {
        selectedPaletteColor = color;
        renderPalette();
      };
      container.appendChild(item);
    });
  }

  // ── CATEGORY MANAGE ──
  function renderCatChips(){
    const c=document.getElementById('cat-chips-form'); c.innerHTML='';
    categories.forEach(cat=>{
      const sel=selectedCat===cat.name; const ch=document.createElement('div'); ch.className='cat-chip'+(sel?' selected':'');
      if(sel){ ch.style.background=cat.color+'33'; ch.style.borderColor=cat.color; }
      ch.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${cat.color}"></span>${cat.name}`;
      ch.onclick=()=>{ selectedCat=selectedCat===cat.name?null:cat.name; renderCatChips(); }; c.appendChild(ch);
    });
  }
  function renderCatSettings(){
    const c=document.getElementById('cat-setting-list'); c.innerHTML='';
    categories.forEach((cat,idx)=>{
      const item=document.createElement('div');
      item.className='layer-item';
      item.style.cssText="justify-content:space-between; margin-bottom:6px; display:flex; align-items:center; width:100%;"; // 💥오류 교정 완료!
      item.innerHTML=`<span style="font-size:13px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${cat.color};margin-right:6px;vertical-align:middle"></span>${cat.name}</span>
        <button onclick="deleteCategory(${idx})" style="background:none;border:none;color:var(--danger);font-size:12px;cursor:pointer;margin-left:12px">삭제</button>`;
      c.appendChild(item);
    });
  }
  function addNewCategory(){
    const name = document.getElementById('new-cat-name').value.trim();
    const color = selectedPaletteColor;

    if(!name) { showToast('카테고리 이름을 입력하세요.'); return; }
    if(categories.find(c=>c.name===name)){ showToast('이미 존재하는 카테고리입니다.'); return; }

    categories.push({name, color});
    localStorage.setItem('nl_cats2', JSON.stringify(categories));

    renderCatSettings();
    renderCatChips();
    renderFilterCatChips();
    document.getElementById('new-cat-name').value = '';
    showToast(`📁 [${name}] 카테고리가 추가되었습니다.`);
  }
  function deleteCategory(idx){
    if(!confirm(`"${categories[idx].name}" 카테고리를 삭제할까요?`)) return;
    categories.splice(idx,1); localStorage.setItem('nl_cats2',JSON.stringify(categories));
    renderCatSettings(); renderCatChips(); renderFilterCatChips(); renderMarkers(); renderObs();
  }

  // ── TOAST MESSAGE ──
  function showToast(msg){
    const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
  }
</script>
</body>
